<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDLESS SIGNAL</title>
    <style>
        :root { --base-font: 1.1rem; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #111; color: #ddd; margin: 0; padding: 20px; line-height: 1.6; font-size: var(--base-font); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #1a1a1a; position: sticky; top: 0; z-index: 100; }
        .home-btn { color: #00ffff; font-size: 1.3em; text-decoration: none; }
        h1 { color: #ffcc00; font-size: 2.8em; }
        .controls { margin: 20px 0; text-align: center; }
        .controls button { background: #333; color: #ffcc00; padding: 8px 16px; margin: 5px; border-radius: 6px; }
        .section { max-width: 1100px; margin: 60px auto; }
        .section h2 { color: #ff8800; border-bottom: 3px solid #ff8800; padding-bottom: 10px; }
        .band-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .band-card { background: #222; border-radius: 12px; overflow: hidden; text-align: center; transition: 0.3s; }
        .band-card:hover { transform: scale(1.05); }
        .band-card img { width: 100%; height: 180px; object-fit: cover; }
        .band-card h3 { margin: 15px 0 5px; color: #ffcc00; }
        footer { text-align: center; color: #666; margin-top: 80px; }
    </style>
</head>
<body>
    <header>
        <h1>ENDLESS SIGNAL</h1>
        <a href="#" class="home-btn" onclick="window.scrollTo(0,0)">HOME</a>
    </header>

    <div class="controls">
        <button onclick="setFont(0.9)">小字</button>
        <button onclick="setFont(1.1)">中字</button>
        <button onclick="setFont(1.3)">大字</button>
    </div>

    <div id="bands" class="section">
        <h2>樂隊列表（A-Z 自動排序）</h2>
        <div class="band-list" id="band-grid"></div>
    </div>

    <div class="section">
        <h2>更新履歷</h2>
        <ul>
            <li>2026-03-14 新增 Aliene Ma'riage《古の愛物語～ エンドレス》歌詞與翻譯</li>
            <li>2026-03-14 上傳 1 張新写真</li>
            <!-- 你之後用 StackEdit 直接在這裡新增即可 -->
        </ul>
    </div>

    <div class="section">
        <h2>写真館（A-Z 排序）</h2>
        <div class="band-list" id="photo-grid"></div>
    </div>

    <footer>© 2026 Hurricane-Zanka | Powered by GitHub Pages</footer>

    <script>
        // === 這裡新增樂隊（自動 A-Z 排序 + 肖像）===
        const bands = [
            { name: "Aliene Ma'riage", portrait: "assets/images/alienemarriage.jpg", url: "bands/alienemarriage.html" },
            { name: "狂華", portrait: "assets/images/kyouka.jpg", url: "bands/kyouka.html" },
            // 繼續新增 ↓（格式完全一樣）
            // { name: "另一樂團", portrait: "assets/images/xxx.jpg", url: "bands/xxx.html" },
        ];

        // 自動 A-Z 排序並顯示
        function renderBands() {
            bands.sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
            const html = bands.map(b => `
                <div class="band-card">
                    <a href="${b.url}">
                        <img src="${b.portrait}" alt="${b.name}">
                        <h3>${b.name}</h3>
                    </a>
                </div>
            `).join('');
            document.getElementById('band-grid').innerHTML = html;
            document.getElementById('photo-grid').innerHTML = html;  // 写真館同步顯示
        }
        renderBands();

        function setFont(size) {
            document.documentElement.style.setProperty('--base-font', size + 'rem');
        }
    </script>
</body>
</html>
