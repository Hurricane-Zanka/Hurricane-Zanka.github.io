<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狂華</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            background: #000; 
            color: #eee; 
            margin: 0; 
            padding: 30px; 
            line-height: 1.6; 
        }
        h1 { 
            color: #aaccff; 
            text-align: center; 
            font-size: 2.5em; 
            margin-bottom: 8px; 
        }
        .subtitle { 
            color: #ddd; 
            text-align: center; 
            font-size: 1.1em; 
            margin-bottom: 30px; 
        }
        .headshot { 
            width: 280px; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 12px; 
            box-shadow: 0 0 20px rgba(170,204,255,0.5); 
            display: block; 
            margin: 0 auto 30px; 
        }
        .album { 
            background: #111; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 40px; 
            display: flex; 
            gap: 30px; 
            align-items: center; 
        }
        .album img { 
            width: 280px; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 12px; 
        }
        .album-info { flex: 1; }
        .album-name { color: #aaccff; font-size: 1.5em; margin-bottom: 15px; }
        .song a { 
            color: #ddd; 
            text-decoration: none; 
            font-size: 1.1em; 
        }
        .song a:hover { color: #bbddff; }
        .credits { color: #999; font-size: 0.95em; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>狂華</h1>
    <p class="subtitle">Vocal</p >

    < img src="assets/images/kyouka.jpg" class="headshot" alt="狂華">

    <!-- Les Soirée 夜の舞踏会~ル・ソワレ~完結篇 -->
    <div class="album">
        < img src="../assets/images/kyouka.jpg" alt="cover">
        <div class="album-info">
            <div class="album-name">Les Soirée 夜の舞踏会~ル・ソワレ~完結篇</div>
            
            <div class="song">
                <a href=" ">古の愛物語～エンドレス</a >
                <div class="credits">作詞 / 狂華　作曲 / RAY, MAST</div>
                <div class="credits">譯者：Zanka</div>
            </div>

    <!-- 第二張專輯（繼續複製上面區塊即可新增） -->
    <div class="album">
        < img src="../assets/images/album-another.jpg" alt="專輯封面">
        <div class="album-info">
            <div class="album-name">另一張專輯名稱</div>
            
            <div class="song">
                <a href="/你的文章檔名.html">歌名1</a >
                <div class="credits">作詞／作曲：狂華 / XXX 譯者：你的名字</div>
            </div>
        </div>
    </div>

</body>
</html>
