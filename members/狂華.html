<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狂華 (Kyouka)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            padding: 2rem;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .text-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }
        .text-group h1 {
            writing-mode: vertical-rl;
            text-align: center;
            font-size: clamp(2rem, 3.5vw, 2.5rem);
            line-height: 1;
        }
        .text-group small {
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            color: white;
        }
        .text-group span {
            color: #ff0000;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            margin-top: 1.5rem;
        }
        .album-section {
            display: flex;
            gap: 3rem;
            align-items: center;
            width: 100%;
        }
        .album-section img {
            width: clamp(180px, 20vw, 220px);
            height: auto;
            object-fit: cover;
        }
        .album-text {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .album-text h3 {
            font-size: clamp(0.9rem, 1.2vw, 1.1rem);
            color: #ffcc00;
        }
        .album-text p {
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            color: #cccccc;
        }
        @media (max-width: 768px) {
            .text-group {
                gap: 0.3rem;
            }
            .text-group h1 {
                font-size: 1.8rem;
            }
            .text-group small {
                font-size: 0.8rem;
            }
            .text-group span {
                font-size: 1rem;
                margin-top: 1rem;
            }
            .album-section {
                flex-direction: column;
                gap: 2rem;
            }
            .album-section img {
                width: 100%;
                max-width: 200px;
                height: auto;
            }
            .album-text {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="text-group">
            <h1>狂華</h1>
            <small>Vocal</small>
            <span>Aliene Ma'riage</span>
        </div>
        <div class="album-section">
            <img src="assets/images/kyouka.jpg" alt="cover">
            <div class="album-text">
                <h3>Les Soirée 夜の舞踏会/断罪の章~神罰篇</h3>
                <span>Aliene Ma'riage</span>
                <a href name="Les Soirée 夜の舞踏会/断罪の章~神罰篇" url:"_posts/alienemarriage.md">
                     <br><strong>古の愛物語～ エンドレス</strong>
            </div>
        </div>
    </div>
</body>
</html>
