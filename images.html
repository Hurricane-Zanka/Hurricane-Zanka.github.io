<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的圖片庫 - Hurricane-Zanka</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #111; color: #ddd; margin: 0; padding: 30px; line-height: 1.6; }
        h1 { text-align: center; color: #ffcc00; font-size: 2.5em; }
        nav { text-align: center; margin: 20px 0 40px; font-size: 1.1em; }
        nav a { color: #00ffff; margin: 0 20px; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .gallery { max-width: 1100px; margin: auto; }
        .section { margin-bottom: 60px; }
        .section h2 { color: #ff8800; border-bottom: 3px solid #ff8800; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item { background: #222; border-radius: 12px; overflow: hidden; transition: all 0.3s; }
        .item:hover { transform: scale(1.08); box-shadow: 0 0 25px rgba(255, 136, 0, 0.6); }
        .item img { width: 100%; height: auto; display: block; }
        .item p { padding: 12px; margin: 0; font-size: 14px; text-align: center; color: #ccc; }
        .disclaimer { font-size: 13px; color: #888; text-align: center; margin: 80px 0 30px; border-top: 1px solid #444; padding-top: 20px; }
    </style>
</head>
<body>
    <h1>Hurricane-Zanka 的圖片庫</h1>
    <nav>
        <a href="index.html">HOME</a> |
        <a href="images.html">GALLERY</a>
    </nav>

    <div class="gallery">
        <!--  -->
        <div class="section">
            <h2>Flyers</h2>
            <div class="grid">
                <!-- 每張圖片這樣加（記得先上傳到 images 資料夾） -->
                <div class="item">
                    <img src="images/你的圖片1.jpg" alt="Flyer 1">
                    <p>Aliene Ma'riage 《《古の愛物語～ エンドレス》</p>
                </div>
            </div>
        </div>
    </div>

    <div class="disclaimer">
        可自由使用，請標註原始出處。<br>
    </div>
</body>
</html>
